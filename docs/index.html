<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Happenstance</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="pairing-insights.js" defer></script>
    <script src="app.js" defer></script>
  </head>
  <body>
    <header class="app-header">
      <h1 id="app-title">Happenstance</h1>
      <button id="filter-toggle" class="icon-button" type="button" aria-expanded="false" aria-controls="view-root">
        <span aria-hidden="true">☰</span>
        <span>Filters</span>
      </button>
    </header>

    <main id="view-root" tabindex="-1"></main>

    <nav id="tab-bar" aria-label="Primary">
      <button class="tab-item active" type="button" data-view="explore" aria-current="page">
        <span aria-hidden="true">⌕</span>
        <span>Explore</span>
      </button>
      <button class="tab-item" type="button" data-view="timeline">
        <span aria-hidden="true">◷</span>
        <span>Timeline</span>
      </button>
      <button class="tab-item" type="button" data-view="plan">
        <span aria-hidden="true">＋</span>
        <span>Plan</span>
      </button>
      <button class="tab-item" type="button" data-view="saved">
        <span aria-hidden="true">♡</span>
        <span>Saved</span>
      </button>
    </nav>
  </body>
</html>
